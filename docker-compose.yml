# ─────────────────────────────────────────────────────────────
# ESD G7T1 — Tutor Matching Platform
# Supabase (PostgreSQL) is hosted remotely — no local DB needed
# ─────────────────────────────────────────────────────────────

## volume for kong database persistence 
volumes:
  kong_data:
services:

  # ── Message Broker ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP — Flask services connect here
      - "15672:15672"   # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── Atomic Services ─────────────────────────────────────────
  tutor:
    build: ./services/tutor
    container_name: tutor
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  student:
    build: ./services/student
    container_name: student
    ports:
      - "5002:5002"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  interest:
    build: ./services/interest
    container_name: interest
    ports:
      - "5003:5003"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  trials:
    build: ./services/trials
    container_name: trials
    ports:
      - "5004:5004"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  payment:
    build: ./services/payment
    container_name: payment
    ports:
      - "5005:5005"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notification:
    build: ./services/notification
    container_name: notification
    ports:
      - "5006:5006"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
  
  credit:
    build: ./services/credit
    container_name: credit
    ports:
      - "5007:5007"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ── Composite Services ───────────────────────────────────────
  indicate-interest:
    build: ./services/indicate-interest
    container_name: indicate-interest
    ports:
      - "5010:5010" 
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      tutor:
        condition: service_started
      interest:
        condition: service_started
    restart: on-failure

  continue-lessons:
    build: ./services/continue-lessons
    container_name: continue-lessons
    ports:
      - "5014:5014"
    environment:
      - TRIALS_SERVICE_URL=http://trials:5004
      - TUTOR_SERVICE_URL=http://tutor:5001
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      trials:
        condition: service_started
      tutor:
        condition: service_started
    restart: on-failure

  cancel-trial-booking:
    build: ./services/cancel-trial-booking
    container_name: cancel-trial-booking
    ports:
      - "5015:5015"
    environment:
      - TRIALS_SERVICE_URL=http://trials:5004
      - TUTOR_SERVICE_URL=http://tutor:5001
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      trials:
        condition: service_started
      tutor:
        condition: service_started
    restart: on-failure

  cancel-trial-lessons:
    build: ./services/cancel-trials-lessons
    container_name: cancel-trial-lessons
    ports:
      - "5016:5016"
    environment:
      - TRIALS_SERVICE_URL=http://trials:5004
      - CREDIT_SERVICE_URL=http://credit:5007
      - STUDENT_SERVICE_URL=http://student:5002
      - TUTOR_SERVICE_URL=http://tutor:5001
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      trials:
        condition: service_started
      credit:
        condition: service_started
      student:
        condition: service_started
      tutor:
        condition: service_started
    restart: on-failure

  get-interested-students:
    build: ./services/get-interested-students
    container_name: get-interested-students
    ports:
      - "5011:5011"
    environment:
      - INTEREST_SERVICE_URL=http://interest:5003
      - STUDENT_SERVICE_URL=http://student:5002
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      tutor:
        condition: service_started
      interest:
        condition: service_started
    restart: on-failure

  accept-student:
    build: ./services/accept-student
    container_name: accept-student
    ports:
      - "5012:5012"
    environment:
      - INTEREST_SERVICE_URL=http://interest:5003
      - TRIALS_SERVICE_URL=http://trials:5004
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      interest:
        condition: service_started
      trials:
        condition: service_started
    restart: on-failure

  make-trial-booking:
    build: ./services/make-trial-booking
    container_name: make-trial-booking
    ports:
      - "5013:5013"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      tutor:
        condition: service_started
      interest:
        condition: service_started
    restart: on-failure

  #######################################
  # Postgres: The database used by Kong
  #######################################
  kong-database:
    image: postgres:17.4
    restart: always
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: password
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  #######################################
  # Kong database migration
  #######################################
  kong-migration:
    image: kong/kong-gateway:3.9
    command: "kong migrations bootstrap"
    restart: always
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
    depends_on:
      - kong-database

  #######################################
  # Kong: The API Gateway
  #######################################
  kong:
    image: kong/kong-gateway:3.9
    restart: always
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: password
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
    depends_on:
      - kong-migration
    ports: # https://docs.konghq.com/gateway/latest/production/networking/default-ports/
      - "8000:8000" # Takes incoming HTTP traffic from Consumers, and forwards it to upstream Services.
      - "8001:8001" # Admin API. Listens for calls from the command line over HTTP.
      - "8002:8002" # Kong Manager (GUI). Listens for HTTP traffic.
