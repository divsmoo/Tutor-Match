_format_version: "3.0"
services:

  # ── Atomic Services ───────────────────────────────────────────

  - name: tutor-service
    host: tutor
    port: 5001
    protocol: http
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    retries: 5
    enabled: true
    routes:
    - name: tutor-all
      paths:
      - /tutor
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      strip_path: false
      path_handling: v0
      preserve_host: false
      protocols:
      - http
      https_redirect_status_code: 426
      regex_priority: 0
      request_buffering: true
      response_buffering: true

