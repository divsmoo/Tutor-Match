plugins:
  - name: cors
    enabled: true
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - apikey
        - Authorization
      credentials: true
      preflight_continue: false
      max_age: 3600

  - name: key-auth
    enabled: true
    config:
      hide_credentials: true

consumers:
  - username: tutormatch-frontend
    keyauth_credentials:
      - key: tm-frontend-api-key-2026
