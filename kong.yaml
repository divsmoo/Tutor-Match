_format_version: "3.0"
services:
- connect_timeout: 60000
  enabled: true
  host: tutor
  name: tutor-service
  port: 5001
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    methods:
    - GET
    name: GET
    path_handling: v0
    paths:
    - /tutorrr
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  tags:
  - test2ndApril
  write_timeout: 60000
