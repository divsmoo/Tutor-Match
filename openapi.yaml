openapi: 3.0.3
info:
  title: Tutor-Match Platform API
  version: 1.0.0
  description: |
    Consolidated API documentation for the Tutor-Match microservices.

    Notes:
    - **Primary gateway**: Kong proxy at `http://localhost:8000`.
    - Some endpoints may be called directly by port during development if Kong routes are not configured yet.
    - The `credit` service exposes **GraphQL** at `/credit/graphql` (via Kong) or `http://localhost:5007/graphql` (direct).
servers:
  - url: http://localhost:8000
    description: Kong proxy (recommended)
  - url: http://localhost:5001
    description: Tutor service (direct)
  - url: http://localhost:5002
    description: Student service (direct)
  - url: http://localhost:5003
    description: Interest service (direct)
  - url: http://localhost:5004
    description: Trials service (direct)
  - url: http://localhost:5006
    description: Notification service (direct)
  - url: http://localhost:5007
    description: Credit service (direct)
  - url: http://localhost:5010
    description: Indicate Interest (composite, direct)
  - url: http://localhost:5011
    description: Get Interested Students (composite, direct)
  - url: http://localhost:5012
    description: Accept Student (composite, direct)
  - url: http://localhost:5013
    description: Make Trial Booking (composite, direct)
  - url: http://localhost:5014
    description: Continue Lessons (composite, direct)
  - url: http://localhost:5015
    description: Cancel Trial Booking (composite, direct)
  - url: http://localhost:5016
    description: Cancel Trial Lessons (composite, direct)

tags:
  - name: Health
  - name: Tutor
  - name: Student
  - name: Interest
  - name: Trials
  - name: Credit
  - name: Indicate Interest (Composite)
  - name: Get Interested Students (Composite)
  - name: Accept Student (Composite)
  - name: Make Trial Booking (Composite)
  - name: Continue Lessons (Composite)
  - name: Cancel Trial Booking (Composite)
  - name: Cancel Trial Lessons (Composite)
  - name: Notification

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check (service-specific)
      description: |
        Each service exposes `GET /health`. When accessed through Kong, this path will
        resolve to whichever upstream has the `/health` route mapped.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  # ───────────────────────── Tutor (Atomic) ─────────────────────────
  /tutor:
    get:
      tags: [Tutor]
      summary: Get all tutors
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tutor"
    post:
      tags: [Tutor]
      summary: Create tutor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TutorCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tutor"
        "500":
          $ref: "#/components/responses/Error"

  /tutor/{tutor_id}:
    parameters:
      - in: path
        name: tutor_id
        required: true
        schema: { type: integer }
    get:
      tags: [Tutor]
      summary: Get tutor by ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tutor"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Tutor]
      summary: Update tutor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TutorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tutor"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Tutor]
      summary: Delete tutor
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ───────────────────────── Student (Atomic) ───────────────────────
  /student:
    get:
      tags: [Student]
      summary: Get all students
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Student"
    post:
      tags: [Student]
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Student"
        "500":
          $ref: "#/components/responses/Error"

  /student/{student_id}:
    parameters:
      - in: path
        name: student_id
        required: true
        schema: { type: integer }
    get:
      tags: [Student]
      summary: Get student by ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Student]
      summary: Update student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Student"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Student]
      summary: Delete student
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ───────────────────────── Interest (Atomic) ──────────────────────
  /interest:
    get:
      tags: [Interest]
      summary: Get all interests
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Interest"
    post:
      tags: [Interest]
      summary: Create interest (status forced to PENDING)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Interest"
        "400":
          $ref: "#/components/responses/Error"

  /interest/tutor/{tutor_id}:
    parameters:
      - in: path
        name: tutor_id
        required: true
        schema: { type: integer }
    get:
      tags: [Interest]
      summary: Get interests by tutor
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Interest"

  /interest/tutor/{tutor_id}/students:
    parameters:
      - in: path
        name: tutor_id
        required: true
        schema: { type: integer }
    get:
      tags: [Interest]
      summary: Get PENDING student IDs for tutor
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tutor_id: { type: integer }
                  student_ids:
                    type: array
                    items: { type: integer }

  /interest/student/{student_id}:
    parameters:
      - in: path
        name: student_id
        required: true
        schema: { type: integer }
    get:
      tags: [Interest]
      summary: Get interests by student
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Interest"

  /interest/{interest_id}:
    parameters:
      - in: path
        name: interest_id
        required: true
        schema: { type: integer }
    get:
      tags: [Interest]
      summary: Get interest by ID
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Interest"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Interest]
      summary: Update interest (commonly status)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example: { status: ACCEPTED }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Interest"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Interest]
      summary: Delete interest by ID
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          $ref: "#/components/responses/Error"

  # ───────────────────────── Trials (Atomic) ────────────────────────
  /trials:
    get:
      tags: [Trials]
      summary: Get all trials
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialsListResponse"
    post:
      tags: [Trials]
      summary: Create trial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrialCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialCreateResponse"
        "400":
          $ref: "#/components/responses/Error"

  /trials/{trial_id}:
    parameters:
      - in: path
        name: trial_id
        required: true
        schema: { type: integer }
    put:
      tags: [Trials]
      summary: Update trial status (and optionally other fields)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrialStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrialUpdateResponse"
        "404":
          $ref: "#/components/responses/Error"

  # ───────────────────────── Credit (GraphQL) ───────────────────────
  /graphql:
    post:
      tags: [Credit]
      summary: Credit GraphQL endpoint (direct credit service)
      description: |
        This path is **direct service** (`http://localhost:5007/graphql`).
        Through Kong you likely want `/credit/graphql` depending on your Kong routing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphQLRequest"
            examples:
              creditQuery:
                summary: Query credit balance
                value:
                  query: "query { credit(studentId: 1) { student_id balance } }"
              deductMutation:
                summary: Deduct credits
                value:
                  query: "mutation { deductCredits(studentId: 1, amount: 10) { studentId balance } }"
              upsertMutation:
                summary: Top up credits
                value:
                  query: "mutation { upsertCredits(studentId: 1, amount: 50) { studentId balance } }"
      responses:
        "200":
          description: GraphQL response (data/errors)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ───────────────────────── Composite services ─────────────────────
  /indicate-interest:
    post:
      tags: [Indicate Interest (Composite)]
      summary: Scenario 1 — Student indicates interest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndicateInterestRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndicateInterestResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /interested-students/{tutor_id}:
    parameters:
      - in: path
        name: tutor_id
        required: true
        schema: { type: integer }
    get:
      tags: [Get Interested Students (Composite)]
      summary: Scenario 2a — Tutor views interested students
      responses:
        "200":
          description: Aggregated student list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Student"
        "502":
          $ref: "#/components/responses/Error"

  /accept-student:
    post:
      tags: [Accept Student (Composite)]
      summary: Scenario 2a — Tutor accepts student + creates trial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptStudentRequest"
      responses:
        "200":
          description: Accepted and trial created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptStudentResponse"
        "400":
          $ref: "#/components/responses/Error"

  /initiate-payment:
    post:
      tags: [Make Trial Booking (Composite)]
      summary: "Scenario 2b — Step 1: create PaymentIntent"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiatePaymentResponse"
        "402":
          $ref: "#/components/responses/Error"

  /confirm-booking:
    post:
      tags: [Make Trial Booking (Composite)]
      summary: "Scenario 2b — Step 2: confirm booking after Stripe success"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmBookingRequest"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmBookingResponse"
        "400":
          $ref: "#/components/responses/Error"

  /make-trial-booking:
    post:
      tags: [Make Trial Booking (Composite)]
      summary: Legacy single-step booking (kept for compatibility)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MakeTrialBookingLegacyRequest"
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MakeTrialBookingLegacyResponse"
        "402":
          $ref: "#/components/responses/Error"

  /continue-lessons:
    post:
      tags: [Continue Lessons (Composite)]
      summary: Scenario 2c — Student continues lessons (trial -> COMPLETED)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueLessonsRequest"
      responses:
        "200":
          description: Completed + tutor notified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContinueLessonsResponse"
        "400":
          $ref: "#/components/responses/Error"

  /trials/available-dates:
    get:
      tags: [Cancel Trial Booking (Composite)]
      summary: Scenario 3a — List cancellable trials for student-tutor pair
      parameters:
        - in: query
          name: student_id
          required: true
          schema: { type: integer }
        - in: query
          name: tutor_id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancellable trials
          content:
            application/json:
              schema:
                type: object
                properties:
                  student_id: { type: integer }
                  tutor_id: { type: integer }
                  trials:
                    type: array
                    items: { $ref: "#/components/schemas/Trial" }
        "400":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"

  /cancel-trial-booking:
    post:
      tags: [Cancel Trial Booking (Composite)]
      summary: Scenario 3a — Student cancels a trial booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelTrialBookingRequest"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTrialBookingResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /cancel-trial:
    post:
      tags: [Cancel Trial Lessons (Composite)]
      summary: Scenario 3b — Tutor cancels trial and refunds credits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelTrialLessonsRequest"
      responses:
        "200":
          description: Cancelled + refunded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelTrialLessonsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      properties:
        service: { type: string }
        status: { type: string }
        db:
          type: string
          description: Present on some services (e.g., trials) to indicate mock/supabase.

    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }
        details: {}
        code: { type: integer }

    Tutor:
      type: object
      additionalProperties: true
      description: Tutor record (shape stored in Supabase).
      properties:
        tutor_id: { type: integer }
        name: { type: string }
        subject: { type: string }
        contact_info: { type: string }
        rate: { type: number }

    TutorCreate:
      allOf:
        - $ref: "#/components/schemas/Tutor"
      description: Create tutor (fields are passed through to Supabase).

    TutorUpdate:
      type: object
      additionalProperties: true
      description: Update tutor (partial fields allowed).

    Student:
      type: object
      additionalProperties: true
      description: Student record (shape stored in Supabase; typically contains `details` JSON).
      properties:
        student_id: { type: integer }
        details:
          type: object
          additionalProperties: true

    StudentCreate:
      allOf:
        - $ref: "#/components/schemas/Student"
      description: Create student (fields are passed through to Supabase).

    StudentUpdate:
      type: object
      additionalProperties: true
      description: Update student (partial fields allowed).

    Interest:
      type: object
      additionalProperties: true
      properties:
        interest_id: { type: integer }
        tutor_id: { type: integer }
        student_id: { type: integer }
        status:
          type: string
          enum: [PENDING, ACCEPTED, EXPIRED, CANCELLED]
        created:
          type: string
          description: Supabase timestamp field name used by expiry job.

    InterestCreate:
      type: object
      required: [student_id, tutor_id]
      properties:
        student_id: { type: integer }
        tutor_id: { type: integer }

    Trial:
      type: object
      additionalProperties: true
      properties:
        trial_id: { type: integer }
        student_id: { type: integer }
        tutor_id: { type: integer }
        trial_date: { type: string }
        start_time: { type: string }
        end_time: { type: string }
        subject: { type: string }
        notes: { type: string }
        status:
          type: string
          enum: [CONFIRMED, PENDING, PENDING_PAYMENT, USER_CANCELLED, TUTOR_CANCELLED, COMPLETED]
        created_at: { type: string }
        updated_at: { type: string }

    TrialsListResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        data:
          type: array
          items: { $ref: "#/components/schemas/Trial" }
        message: { type: string }

    TrialCreate:
      type: object
      required: [student_id, tutor_id, trial_date, start_time, end_time]
      properties:
        student_id: { type: integer }
        tutor_id: { type: integer }
        trial_date: { type: string, example: "2026-04-06" }
        start_time: { type: string, example: "14:00" }
        end_time: { type: string, example: "15:00" }
        subject: { type: string }
        notes: { type: string }
        status:
          type: string
          enum: [CONFIRMED, PENDING, PENDING_PAYMENT, USER_CANCELLED, TUTOR_CANCELLED, COMPLETED]
          default: PENDING

    TrialCreateResponse:
      type: object
      properties:
        code: { type: integer, example: 201 }
        message: { type: string }
        data: { $ref: "#/components/schemas/Trial" }

    TrialStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [CONFIRMED, PENDING, PENDING_PAYMENT, USER_CANCELLED, TUTOR_CANCELLED, COMPLETED]
        trial_date: { type: string }
        start_time: { type: string }
        end_time: { type: string }
        updated_at: { type: string }

    TrialUpdateResponse:
      type: object
      properties:
        code: { type: integer, example: 200 }
        message: { type: string }
        data: { $ref: "#/components/schemas/Trial" }

    GraphQLRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        variables:
          type: object
          additionalProperties: true
        operationName: { type: string, nullable: true }

    IndicateInterestRequest:
      type: object
      required: [student_id, tutor_id, student_name]
      properties:
        student_id: { type: integer }
        tutor_id: { type: integer }
        student_name: { type: string }

    IndicateInterestResponse:
      type: object
      properties:
        message: { type: string }
        interest_id: { type: integer }

    AcceptStudentRequest:
      type: object
      required: [interest_id, proposed_dates, trial_date, start_time, end_time]
      properties:
        interest_id: { type: integer }
        proposed_dates:
          type: array
          items: { type: string }
        trial_date: { type: string }
        start_time: { type: string }
        end_time: { type: string }
        notes: { type: string }

    AcceptStudentResponse:
      type: object
      properties:
        message: { type: string }
        interest_id: { type: integer }
        trial: { $ref: "#/components/schemas/Trial" }

    InitiatePaymentRequest:
      type: object
      required: [student_id, tutor_id, trial_id]
      properties:
        student_id: { type: integer }
        tutor_id: { type: integer }
        trial_id: { type: integer }
        start_time: { type: string, description: Optional; used to compute duration for amount. }
        end_time: { type: string, description: Optional; used to compute duration for amount. }

    InitiatePaymentResponse:
      type: object
      properties:
        client_secret: { type: string }
        payment_id: { type: string, nullable: true }
        amount: { type: number }
        amount_cents: { type: integer }
        currency: { type: string, example: sgd }

    ConfirmBookingRequest:
      type: object
      required: [trial_id, student_id, tutor_id, trial_date, start_time, end_time]
      properties:
        trial_id: { type: integer }
        student_id: { type: integer }
        tutor_id: { type: integer }
        trial_date: { type: string }
        start_time: { type: string }
        end_time: { type: string }
        payment_intent_id: { type: string }

    ConfirmBookingResponse:
      type: object
      properties:
        message: { type: string }
        trial_id: { type: integer }
        payment_intent_id: { type: string }

    MakeTrialBookingLegacyRequest:
      type: object
      required: [student_id, tutor_id, trial_date, start_time, end_time, trial_id]
      properties:
        student_id: { type: integer }
        tutor_id: { type: integer }
